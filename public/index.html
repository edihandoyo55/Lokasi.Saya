<!DOCTYPE html>
<html>
<head>
    <title>GeoTracker Pro + Live Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="style.css">
    <style>
        /* Pastikan peta memiliki tinggi */
        #map { 
            height: 400px; 
            width: 100%; 
            margin-top: 20px; 
            border-radius: 8px;
            border: 2px solid #ddd;
        }
    </style>
</head>
<body>
    <div id="auth-section">
        <h2>Login</h2>
        <input type="text" id="username" placeholder="Username">
        <input type="password" id="password" placeholder="Password">
        <button onclick="login()">Masuk</button>
    </div>

    <div id="tracking-section" style="display:none;">
        <h2>Tracking Lokasi Aktif</h2>
        <p>Status: <span id="status">Menunggu data...</span></p>
        <button id="btn-track" onclick="toggleTracking()">Aktifkan Lokasi</button>
        
        <div id="map"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="script.js"></script>
</body>
</html>
